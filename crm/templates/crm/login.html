{% extends 'base.html' %}

{% block auth_content %}
<div class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
            <div class="bg-blue-600 p-8 text-center">
                <i class="fas fa-building text-white text-5xl mb-4"></i>
                <h1 class="text-2xl font-bold text-white">PropCRM</h1>
                <p class="text-blue-200 text-sm">Real Estate Management System</p>
            </div>

            <div class="p-8">
                <h2 class="text-xl font-semibold text-gray-800 mb-6">Sign In</h2>

                {% if form.errors %}
                <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-4">
                    Invalid username or password.
                </div>
                {% endif %}

                <form method="post" class="space-y-4">
                    {% csrf_token %}

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                        <input type="text" name="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                        <input type="password" name="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
                    </div>

                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium">
                        Sign In
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
